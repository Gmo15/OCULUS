<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oculus Membership Journey - Flowchart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            max-width: 90%;
            max-height: 90vh;
            border: 1px solid #d2b58133;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            border-radius: 20px;
        }
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #d2b581;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid #d2b58133;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="flowchart.png" alt="Oculus Membership Journey">
    </div>
    <div class="controls">Oculus Membership Journey / Strategic Roadmap</div>
</body>
</html>
