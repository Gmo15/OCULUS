<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>Oculus Hub Final</title>
    <style>
        body {{ background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 50px; font-family: sans-serif; }}
        .grid {{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }}
        .card {{ position: relative; width: 260px; height: 400px; border-radius: 12px; overflow: hidden; box-shadow: 0 40px 100px #000; border: 1px solid rgba(255,255,255,0.1); }}
        .gloss {{ position: absolute; inset: 0; background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%); background-size: 200% 200%; animation: sweep 5s infinite linear; z-index: 20; pointer-events: none; }}
        @keyframes sweep {{ 0% {{ background-position: -200% -200%; }} 100% {{ background-position: 200% 200%; }} }}
        img {{ width: 100%; height: 100%; object-fit: cover; }}
        .btn {{ margin-top: 20px; padding: 12px; background: #0a0a0a; border: 1px solid #d2b581; color: #fff; border-radius: 8px; width: 100%; text-align: center; font-weight: bold; cursor: pointer; }}
    </style>
</head>
<body>
    <h1 style='letter-spacing: 15px; margin-bottom: 60px; opacity: 0.5; font-weight: 300;'>OCULUS WALLET</h1>
    <div class='grid'>
        <div class='flex flex-col items-center'><div class='card'><div class='gloss'></div><img src='card_founder.png'></div><div class='btn'>INSTALL BLACK</div></div>
        <div class='flex flex-col items-center'><div class='card'><div class='gloss'></div><img src='card_executive.png'></div><div class='btn'>INSTALL SILVER</div></div>
        <div class='flex flex-col items-center'><div class='card'><div class='gloss'></div><img src='card_associate.png'></div><div class='btn'>INSTALL WHITE</div></div>
    </div>
</body>
</html>
