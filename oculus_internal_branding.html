<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oculus Card - INTERNAL BRANDING REVIEW</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            position: relative;
            width: 1000px;
            height: 1000px;
            margin-bottom: 60px;
            background: #111;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }
        .box-base { width: 100%; height: 100%; object-fit: contain; }
        
        /* INTERNAL LOGO PERSPECTIVE - CALIBRATED FOR THE INNER LID (TOP-LEFT AREA) */
        .internal-logo {
            position: absolute;
            top: 21%; /* Moved to center of tilted inner lid */
            left: 40%;
            width: 280px;
            transform: translate(-50%, -50%) perspective(1000px) rotateX(-32deg) rotateY(2deg) skewX(-1.5deg);
            z-index: 10;
            opacity: 0.88;
            pointer-events: none;
            filter: brightness(1.2) contrast(1.1) drop-shadow(0px 1px 2px rgba(0,0,0,0.5));
        }

        .gold-internal {
            filter: invert(0.8) sepia(1) saturate(3) hue-rotate(-10deg) brightness(1.2) contrast(1.1);
        }
        
        .silver-internal {
            filter: invert(0.8) sepia(1) saturate(0) brightness(1.3) contrast(1.1);
        }

        .label {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #D2B581;
            color: black;
            padding: 10px 20px;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- GREEN OPTION: CLEAN MASTER BASE + SILVER LOGO OVERLAY -->
    <div class="container">
        <div class="label">Option 1: Emerald Green Interior (Silver Master)</div>
        <!-- Clean Master Base (No Logo) -->
        <img class="box-base" src="./box_green_open_deck1_MASTER.png">
        
        <!-- Official Logo Overlay (Silver Finish) -->
        <img class="internal-logo silver-internal" src="./internal_logo_official.png" 
             style="top: 25.5%; left: 40.5%; width: 280px; transform: translate(-50%, -50%) perspective(1000px) rotateX(-32deg) rotateY(2.5deg) skewX(-1.5deg);">
    </div>

    <!-- MACASSAR OPTION: INTERNAL MASTER (SILVER) -->
    <div class="container" style="position: relative;">
        <div class="label">Option 2: Macassar Ebony Interior (Silver)</div>
        <img class="box-base" src="./interior_silver_master_final.png">
    </div>

</body>
</html>
