<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 635" width="100%" height="100%">
    <defs>
        <!-- Gradients for the titanium white card base -->
        <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="25%" stop-color="#F8F9FA"/>
            <stop offset="50%" stop-color="#E9ECEF"/>
            <stop offset="75%" stop-color="#DEE2E6"/>
            <stop offset="100%" stop-color="#CED4DA"/>
        </linearGradient>

        <!-- Metallic gradient for the interlocking rings -->
        <linearGradient id="ringMetal" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#F8F9FA"/>
            <stop offset="40%" stop-color="#CED4DA"/>
            <stop offset="60%" stop-color="#ADB5BD"/>
            <stop offset="100%" stop-color="#E9ECEF"/>
        </linearGradient>
        
        <!-- Shine stroke for the rings -->
        <linearGradient id="ringShine" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6c757d"/>
            <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#ced4da"/>
        </linearGradient>

        <filter id="deboss" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="1" dy="1" stdDeviation="1" shadow-color="#000000" shadow-opacity="0.15"/>
            <feDropShadow dx="-1" dy="-1" stdDeviation="1" shadow-color="#FFFFFF" shadow-opacity="1"/>
        </filter>
        <filter id="ringShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" shadow-color="#000000" shadow-opacity="0.1" />
        </filter>
    </defs>

    <!-- Base Card Fill -->
    <rect width="400" height="635" rx="20" fill="url(#cardBg)" stroke="#ADB5BD" stroke-width="2" />

    <!-- Interlocking Circles -->
    <!-- Left Circle -->
    <circle cx="160" cy="270" r="65" fill="none" stroke="url(#ringShine)" stroke-width="14" filter="url(#ringShadow)"/>
    <circle cx="160" cy="270" r="65" fill="none" stroke="url(#ringMetal)" stroke-width="12" filter="url(#deboss)"/>
    
    <!-- Right Circle -->
    <circle cx="240" cy="270" r="65" fill="none" stroke="url(#ringShine)" stroke-width="14" filter="url(#ringShadow)"/>
    <circle cx="240" cy="270" r="65" fill="none" stroke="url(#ringMetal)" stroke-width="12" filter="url(#deboss)"/>

    <!-- Fix overlap (weaving effect) -->
    <path d="M 200 213 A 65 65 0 0 1 225 327" fill="none" stroke="url(#ringShine)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 200 213 A 65 65 0 0 1 225 327" fill="none" stroke="url(#ringMetal)" stroke-width="12" stroke-linecap="round" filter="url(#deboss)"/>

    <!-- Brand Name -->
    <text x="200" y="380" font-family="'Outfit', sans-serif" font-weight="300" font-size="28" fill="#495057" text-anchor="middle" letter-spacing="4" filter="url(#deboss)">
        OCULUS CARD
    </text>

    <!-- Name Label (Primary Member layout) -->
    <text x="200" y="490" font-family="'Outfit', sans-serif" font-weight="400" font-size="18" fill="#212529" text-anchor="middle" letter-spacing="2" filter="url(#deboss)">
        JOHN DOE
    </text>
    <text x="200" y="510" font-family="'Outfit', sans-serif" font-weight="500" font-size="10" fill="#495057" text-anchor="middle" letter-spacing="1">
        PRIMARY MEMBER
    </text>

    <!-- Valid Thru & Membership No (Bottom Left) -->
    <text x="35" y="560" font-family="'Outfit', sans-serif" font-weight="500" font-size="9" fill="#6c757d" letter-spacing="1">
        VALID THRU
    </text>
    <text x="35" y="585" font-family="'Outfit', sans-serif" font-weight="500" font-size="22" fill="#343a40" letter-spacing="2" filter="url(#deboss)">
        11 / 28
    </text>
    <text x="35" y="605" font-family="'Outfit', sans-serif" font-weight="500" font-size="8" fill="#495057" letter-spacing="1">
        MEMBERSHIP NO: 0021-4981-7734
    </text>
</svg>
